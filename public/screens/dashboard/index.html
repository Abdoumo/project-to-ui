<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Task Manager</title>
  <link rel="stylesheet" href="../../styles/global.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">✓</div>
        <h1 class="app-name">TaskFlow</h1>
      </div>

      <nav class="sidebar-nav">
        <a href="./index.html" class="nav-item active">
          <span class="icon">📊</span>
          <span>Dashboard</span>
        </a>
        <a href="../task-list/index.html" class="nav-item">
          <span class="icon">📝</span>
          <span>All Tasks</span>
        </a>
        <a href="../profile/index.html" class="nav-item">
          <span class="icon">⚙️</span>
          <span>Settings</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-profile">
          <div class="avatar">👤</div>
          <div class="user-info">
            <p class="user-name">Alex Johnson</p>
            <p class="user-email">alex@example.com</p>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <div class="app-content">
      <header class="app-header">
        <h1>Dashboard</h1>
        <button class="btn btn-primary" onclick="openCreateTaskModal()">
          <span>+</span> New Task
        </button>
      </header>

      <div class="page-content">
        <!-- Overview Cards -->
        <div class="overview-grid">
          <div class="overview-card">
            <div class="card-value" id="todayCount">0</div>
            <p class="card-label">Today</p>
          </div>
          <div class="overview-card">
            <div class="card-value" id="upcomingCount">0</div>
            <p class="card-label">Upcoming</p>
          </div>
          <div class="overview-card">
            <div class="card-value" id="totalCount">0</div>
            <p class="card-label">Total Tasks</p>
          </div>
          <div class="overview-card">
            <div class="card-value" id="completedCount">0</div>
            <p class="card-label">Completed</p>
          </div>
        </div>

        <!-- Today's Tasks -->
        <section class="dashboard-section">
          <h2>Today's Tasks</h2>
          <div id="todayTasksList" class="tasks-container">
            <!-- Populated by JS -->
          </div>
          <p id="noTodayTasks" class="empty-state">No tasks for today. Great job! 🎉</p>
        </section>

        <!-- Upcoming Tasks -->
        <section class="dashboard-section">
          <h2>Upcoming (Next 7 Days)</h2>
          <div id="upcomingTasksList" class="tasks-container">
            <!-- Populated by JS -->
          </div>
          <p id="noUpcomingTasks" class="empty-state">No upcoming tasks</p>
        </section>

        <!-- By Project -->
        <section class="dashboard-section">
          <h2>By Project</h2>
          <div id="projectsList" class="projects-container">
            <!-- Populated by JS -->
          </div>
        </section>
      </div>
    </div>
  </div>

  <!-- Create Task Modal -->
  <div id="createTaskModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Create New Task</h2>
        <button class="btn-icon" onclick="closeCreateTaskModal()">✕</button>
      </div>
      <form id="createTaskForm" onsubmit="handleCreateTask(event)">
        <div class="input-group">
          <label>Task Title</label>
          <input type="text" id="taskTitle" required placeholder="e.g., Design landing page">
        </div>

        <div class="input-group">
          <label>Description</label>
          <textarea id="taskDescription" placeholder="Add more details about this task"></textarea>
        </div>

        <div class="form-row">
          <div class="input-group">
            <label>Project</label>
            <select id="taskProject">
              <option value="">Select or type project...</option>
              <option value="Development">Development</option>
              <option value="Product Design">Product Design</option>
              <option value="Business">Business</option>
              <option value="Marketing">Marketing</option>
            </select>
          </div>

          <div class="input-group">
            <label>Priority</label>
            <select id="taskPriority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>

        <div class="input-group">
          <label>Due Date</label>
          <input type="date" id="taskDueDate" required>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeCreateTaskModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Task</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../../js/app.js"></script>
  <script src="./script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Detail - Task Manager</title>
  <link rel="stylesheet" href="../../styles/global.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">✓</div>
        <h1 class="app-name">TaskFlow</h1>
      </div>

      <nav class="sidebar-nav">
        <a href="../dashboard/index.html" class="nav-item">
          <span class="icon">📊</span>
          <span>Dashboard</span>
        </a>
        <a href="../task-list/index.html" class="nav-item">
          <span class="icon">📝</span>
          <span>All Tasks</span>
        </a>
        <a href="../profile/index.html" class="nav-item">
          <span class="icon">⚙️</span>
          <span>Settings</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-profile">
          <div class="avatar">👤</div>
          <div class="user-info">
            <p class="user-name">Alex Johnson</p>
            <p class="user-email">alex@example.com</p>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <div class="app-content">
      <header class="app-header">
        <button class="btn btn-secondary" onclick="goBack()">← Back</button>
      </header>

      <div class="page-content">
        <div class="task-detail-container">
          <!-- Task Header -->
          <div class="task-header">
            <div class="task-header-top">
              <input type="checkbox" id="taskCompleteCheckbox" class="task-complete-checkbox" 
                     onchange="toggleCompleteStatus()">
              <h1 id="taskTitle" contenteditable="true" class="task-title-editable">Loading...</h1>
              <button class="btn btn-danger" onclick="deleteTask()">🗑 Delete</button>
            </div>
            <div id="taskStatusBadges" class="task-status-badges">
              <!-- Populated by JS -->
            </div>
          </div>

          <!-- Task Content -->
          <div class="task-content-area">
            <!-- Main Info -->
            <div class="task-main">
              <section class="detail-section">
                <h2>Description</h2>
                <textarea id="taskDescription" class="description-editable" placeholder="Add a description...">Loading...</textarea>
              </section>

              <section class="detail-section">
                <h2>Activity</h2>
                <div id="activityFeed" class="activity-feed">
                  <p class="activity-item">Task created</p>
                </div>
              </section>
            </div>

            <!-- Sidebar Info -->
            <aside class="task-sidebar">
              <div class="detail-card">
                <h3>Status</h3>
                <select id="taskStatus" onchange="updateTask()">
                  <option value="pending">Pending</option>
                  <option value="in-progress">In Progress</option>
                  <option value="completed">Completed</option>
                </select>
              </div>

              <div class="detail-card">
                <h3>Priority</h3>
                <select id="taskPriority" onchange="updateTask()">
                  <option value="low">🟢 Low</option>
                  <option value="medium">🟡 Medium</option>
                  <option value="high">🔴 High</option>
                </select>
              </div>

              <div class="detail-card">
                <h3>Project</h3>
                <input type="text" id="taskProject" onchange="updateTask()" placeholder="Project name">
              </div>

              <div class="detail-card">
                <h3>Due Date</h3>
                <input type="date" id="taskDueDate" onchange="updateTask()">
              </div>

              <div class="detail-card">
                <h3>Dates</h3>
                <div class="date-info">
                  <p><strong>Created:</strong> <span id="createdDate">-</span></p>
                  <p><strong>Last Updated:</strong> <span id="updatedDate">-</span></p>
                </div>
              </div>

              <button class="btn btn-primary" style="width: 100%;" onclick="saveTask()">Save Changes</button>
            </aside>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Sidebar CSS -->
  <link rel="stylesheet" href="../dashboard/style.css">
  <script src="../../js/app.js"></script>
  <script src="./script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Tasks - Task Manager</title>
  <link rel="stylesheet" href="../../styles/global.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">✓</div>
        <h1 class="app-name">TaskFlow</h1>
      </div>

      <nav class="sidebar-nav">
        <a href="../dashboard/index.html" class="nav-item">
          <span class="icon">📊</span>
          <span>Dashboard</span>
        </a>
        <a href="./index.html" class="nav-item active">
          <span class="icon">📝</span>
          <span>All Tasks</span>
        </a>
        <a href="../profile/index.html" class="nav-item">
          <span class="icon">⚙️</span>
          <span>Settings</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-profile">
          <div class="avatar">👤</div>
          <div class="user-info">
            <p class="user-name">Alex Johnson</p>
            <p class="user-email">alex@example.com</p>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <div class="app-content">
      <header class="app-header">
        <h1>All Tasks</h1>
        <button class="btn btn-primary" onclick="openCreateTaskModal()">
          <span>+</span> New Task
        </button>
      </header>

      <div class="page-content">
        <!-- Filters Section -->
        <div class="filters-section">
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search tasks..." onkeyup="filterTasks()">
          </div>

          <div class="filter-group">
            <button class="filter-btn" id="statusAll" onclick="filterByStatus('all')" style="background-color: var(--primary); color: white;">All</button>
            <button class="filter-btn" id="statusPending" onclick="filterByStatus('pending')">Pending</button>
            <button class="filter-btn" id="statusInProgress" onclick="filterByStatus('in-progress')">In Progress</button>
            <button class="filter-btn" id="statusCompleted" onclick="filterByStatus('completed')">Completed</button>
          </div>

          <div class="filter-group">
            <select id="priorityFilter" onchange="filterTasks()">
              <option value="">All Priorities</option>
              <option value="high">High Priority</option>
              <option value="medium">Medium Priority</option>
              <option value="low">Low Priority</option>
            </select>

            <select id="projectFilter" onchange="filterTasks()">
              <option value="">All Projects</option>
              <option value="Development">Development</option>
              <option value="Product Design">Product Design</option>
              <option value="Business">Business</option>
              <option value="Marketing">Marketing</option>
            </select>
          </div>
        </div>

        <!-- View Toggle -->
        <div class="view-toggle">
          <button class="view-btn active" id="listViewBtn" onclick="setView('list')">📋 List</button>
          <button class="view-btn" id="boardViewBtn" onclick="setView('board')">📊 Board</button>
        </div>

        <!-- Tasks List View -->
        <div id="listView" class="view-container">
          <div id="tasksList" class="tasks-container">
            <!-- Populated by JS -->
          </div>
          <p id="noTasks" class="empty-state">No tasks found</p>
        </div>

        <!-- Tasks Board View -->
        <div id="boardView" class="view-container" style="display: none;">
          <div class="board-container">
            <div class="board-column">
              <h3>Pending</h3>
              <div id="boardPending" class="board-tasks">
                <!-- Populated by JS -->
              </div>
            </div>
            <div class="board-column">
              <h3>In Progress</h3>
              <div id="boardInProgress" class="board-tasks">
                <!-- Populated by JS -->
              </div>
            </div>
            <div class="board-column">
              <h3>Completed</h3>
              <div id="boardCompleted" class="board-tasks">
                <!-- Populated by JS -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Create Task Modal -->
  <div id="createTaskModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Create New Task</h2>
        <button class="btn-icon" onclick="closeCreateTaskModal()">✕</button>
      </div>
      <form id="createTaskForm" onsubmit="handleCreateTask(event)">
        <div class="input-group">
          <label>Task Title</label>
          <input type="text" id="taskTitle" required placeholder="e.g., Design landing page">
        </div>

        <div class="input-group">
          <label>Description</label>
          <textarea id="taskDescription" placeholder="Add more details about this task"></textarea>
        </div>

        <div class="form-row">
          <div class="input-group">
            <label>Project</label>
            <select id="taskProject">
              <option value="">Select or type project...</option>
              <option value="Development">Development</option>
              <option value="Product Design">Product Design</option>
              <option value="Business">Business</option>
              <option value="Marketing">Marketing</option>
            </select>
          </div>

          <div class="input-group">
            <label>Priority</label>
            <select id="taskPriority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>

        <div class="input-group">
          <label>Due Date</label>
          <input type="date" id="taskDueDate" required>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeCreateTaskModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Sidebar CSS -->
  <link rel="stylesheet" href="../dashboard/style.css">
  <script src="../../js/app.js"></script>
  <script src="./script.js"></script>
</body>
</html>
